<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Style Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Базовые переменные для тем */
        :root {
            --bg: #2c3e50;
            --card-bg: #34495e;
            --text: #ffffff;
            --accent: #e74c3c;
            --border: #000000;
            --header: #222;
            --font-main: 'Inter', sans-serif;
        }

        [data-theme="light"] {
            --bg: #ecf0f1;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --accent: #3498db;
            --border: #bdc3c7;
            --header: #ffffff;
        }

        /* Общие стили */
        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            margin: 0;
            min-height: 100vh;
        }

        header {
            background: var(--header);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .controls { display: flex; gap: 15px; align-items: center; }
        
        button {
            padding: 8px 12px;
            cursor: pointer;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 10px;
            text-transform: uppercase;
        }

        /* --- ПИКСЕЛЬНЫЙ МОД (включается через класс .pixel-mode) --- */
        body.pixel-mode {
            font-family: 'Press Start 2P', cursive;
            image-rendering: pixelated;
        }
        
        body.pixel-mode header { border-bottom-width: 6px; }
        
        body.pixel-mode .pixel-border {
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.2), 6px 6px 0px rgba(0,0,0,0.3);
        }

        body:not(.pixel-mode) {
            font-family: var(--font-main);
        }

        body:not(.pixel-mode) .pixel-border {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Стили контейнера */
        .pixel-border {
            background: var(--card-bg);
            padding: 40px;
            margin: 40px auto;
            max-width: 800px;
            text-align: center;
            transition: all 0.3s;
        }

        /* Логотип d-IT-tO */
        .logo-box { position: relative; }
        .logo-btn { color: var(--accent); font-weight: bold; cursor: pointer; }
        .dropdown {
            display: none;
            position: absolute;
            top: 30px;
            left: 0;
            background: var(--card-bg);
            border: 2px solid var(--border);
            min-width: 180px;
            text-align: left;
        }
        .logo-box:hover .dropdown { display: block; }
        .dropdown a { 
            display: block; padding: 10px; color: var(--text); 
            text-decoration: none; font-size: 11px; 
        }
        .dropdown a:hover { background: var(--accent); color: #fff; }

        /* Сетка ссылок */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .social-btn {
            padding: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 2px solid #000;
        }

        .tg { background: #26A5E4; }
        .ds { background: #5865F2; }
        .tw { background: #9146FF; }
        .st { background: #1b2838; }

    </style>
</head>
<body class="pixel-mode" data-theme="dark">

    <header>
        <div class="logo-box">
            <span class="logo-btn">d-IT-tO</span>
            <div class="dropdown">
                <a href="#">tusk75th</a>
                <a href="#">vanitos</a>
                <a href="#">bivni</a>
                <a href="#">isTriger</a>
                <a href="#">www ru</a>
            </div>
        </div>

        <div class="controls">
            <button onclick="togglePixel()">Style: <span id="style-status">Pixel</span></button>
            <button onclick="toggleTheme()">Theme: <span id="theme-status">Dark</span></button>
        </div>
    </header>

    <main id="main-content">
        <div class="pixel-border">
            <h1>[ SYSTEM CONFIG ]</h1>
            <p>Переключайте стили в хедере, чтобы увидеть разницу между современным и ретро дизайном.</p>

            <div class="social-grid">
                <a href="#" class="social-btn tg"><i class="fab fa-telegram fa-xl"></i> TG</a>
                <a href="#" class="social-btn ds"><i class="fab fa-discord fa-xl"></i> DS</a>
                <a href="#" class="social-btn tw"><i class="fab fa-twitch fa-xl"></i> TW</a>
                <a href="#" class="social-btn st"><i class="fab fa-steam fa-xl"></i> ST</a>
            </div>
        </div>
    </main>

    <script>
        // Переключение темы (Dark/Light)
        function toggleTheme() {
            const body = document.body;
            const status = document.getElementById('theme-status');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                status.innerText = 'Light';
            } else {
                body.setAttribute('data-theme', 'dark');
                status.innerText = 'Dark';
            }
        }

        // Переключение формата (Pixel/Modern)
        function togglePixel() {
            const body = document.body;
            const status = document.getElementById('style-status');
            body.classList.toggle('pixel-mode');
            
            if (body.classList.contains('pixel-mode')) {
                status.innerText = 'Pixel';
            } else {
                status.innerText = 'Modern';
            }
        }
    </script>
</body>
</html>
