<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Portfolio</title>
    <!-- Пиксельный шрифт из Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #2c3e50;
            --container-bg: #34495e;
            --accent-color: #e74c3c;
            --text-color: #ffffff;
            --border-color: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            image-rendering: pixelated; /* Оптимизация для пиксельной графики */
            padding-bottom: 50px;
        }

        /* Pixel Border Effect */
        .pixel-border {
            background: var(--container-bg);
            border: 4px solid var(--border-color);
            box-shadow: 
                inset -4px -4px 0px 0px rgba(0,0,0,0.2),
                4px 4px 0px 0px rgba(0,0,0,0.5);
            padding: 20px;
            margin: 20px auto;
            max-width: 900px;
        }

        /* Header */
        header {
            background: #222;
            padding: 20px;
            text-align: center;
            border-bottom: 6px solid var(--border-color);
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 12px;
            margin: 0 15px;
            transition: color 0.1s;
        }

        nav a:hover {
            color: var(--accent-color);
            text-shadow: 2px 2px 0px #000;
        }

        /* Main Section */
        .hero {
            text-align: center;
            padding: 40px 10px;
        }

        h1 { font-size: 18px; margin-bottom: 20px; line-height: 1.5; }
        p { font-size: 10px; line-height: 2; color: #bdc3c7; }

        /* Social Links Grid */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .social-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            text-decoration: none;
            color: white;
            font-size: 10px;
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .social-btn:active {
            transform: scale(0.95);
            box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.3);
        }

        /* Colors for brands */
        .tg { background: #26A5E4; }
        .ds { background: #5865F2; }
        .tw { background: #9146FF; }
        .st { background: #1b2838; }

        /* Sub-sections */
        .sub-section {
            display: none; /* Скрыты по умолчанию, можно добавить JS для переключения */
        }

        .sub-section:target {
            display: block;
        }

        #main:target ~ #game, #main:target ~ #music { display: none; }

        .tag-live {
            background: #ff0000;
            font-size: 8px;
            padding: 2px 5px;
            position: absolute;
            top: -10px;
            right: -10px;
            border: 2px solid #000;
        }

        .btn-wrapper { position: relative; }

    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#main">MAIN</a>
            <a href="#game">GAME</a>
            <a href="#music">MUSIC</a>
        </nav>
    </header>

    <div id="main" class="pixel-border hero">
        <h1>ПРИВЕТ, Я [ИМЯ]</h1>
        <p>ДОБРО ПОЖАЛОВАТЬ НА МОЮ СТРАНИЦУ!<br>НАЙДИТЕ ССЫЛКИ НА МОИ ПРОЕКТЫ И ДЛЯ СВЯЗИ.</p>

        <div class="social-grid">
            <a href="#" class="social-btn tg">
                <i class="fab fa-telegram fa-2xl"></i>
                TELEGRAM
            </a>
            <a href="#" class="social-btn ds">
                <i class="fab fa-discord fa-2xl"></i>
                DISCORD
            </a>
            <div class="btn-wrapper">
                <a href="#" class="social-btn tw">
                    <span class="tag-live">● LIVE</span>
                    <i class="fab fa-twitch fa-2xl"></i>
                    TWITCH
                </a>
            </div>
            <a href="#" class="social-btn st">
                <i class="fab fa-steam fa-2xl"></i>
                STEAM
            </a>
        </div>
    </div>

    <div id="game" class="pixel-border sub-section">
        <h2>[ ИГРЫ ]</h2>
        <p style="margin-top:20px">LOADING PLAYER STATS...</p>
    </div>

    <div id="music" class="pixel-border sub-section">
        <h2>[ МУЗЫКА ]</h2>
        <p style="margin-top:20px">CURRENT TRACK: 8-BIT SUNSHINE</p>
    </div>

</body>
</html>
